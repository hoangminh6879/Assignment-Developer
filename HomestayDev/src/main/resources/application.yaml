  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=HomestayDev;encrypt=true;trustServerCertificate=true;sendStringParametersAsUnicode=true;useUnicode=true;characterEncoding=UTF-8
    username: j2ee
    password: Minh@7979
